name: 🧪 Universal QA Pipeline

on:
  workflow_call:
    inputs:
      project-name:
        required: true
        type: string
      base-url:
        required: false
        type: string
        default: "http://localhost:3000"
      run-stress:
        required: false
        type: boolean
        default: false
      run-load:
        required: false
        type: boolean
        default: true
      load-vus:
        required: false
        type: number
        default: 50
      openai-model:
        required: false
        type: string
        default: "gpt-4o-mini"
    secrets:
      OPENAI_API_KEY:
        required: true

jobs:

  # ─────────────────────────────────────────────────────────────
  # STAGE 1 — Detect stack, generate tests, SANITIZE tests
  # ─────────────────────────────────────────────────────────────
  detect-and-generate:
    name: 🤖 AI · Detect Stack & Generate Tests
    runs-on: ubuntu-latest
    outputs:
      language:  ${{ steps.detect.outputs.language }}
      framework: ${{ steps.detect.outputs.framework }}
      has-api:   ${{ steps.detect.outputs.has-api }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install AI script deps
        run: pip install openai --break-system-packages

      - name: 🔍 Detect stack
        id: detect
        run: python $GITHUB_WORKSPACE/scripts/detect_stack.py
        env:
          WORKSPACE: ${{ github.workspace }}
          BASE_URL:  ${{ inputs.base-url }}

      - name: 🤖 Generate tests via OpenAI
        run: python $GITHUB_WORKSPACE/scripts/ai/generate_tests.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL:   ${{ inputs.openai-model }}
          LANGUAGE:       ${{ steps.detect.outputs.language }}
          FRAMEWORK:      ${{ steps.detect.outputs.framework }}
          CHANGED_FILES:  ${{ steps.detect.outputs.changed-files }}
          PROJECT_NAME:   ${{ inputs.project-name }}
          BASE_URL:       ${{ inputs.base-url }}

      # ── Sanitize BEFORE uploading — fixes playwright imports, wrong routes etc.
      - name: 🔧 Sanitize generated tests
        run: python $GITHUB_WORKSPACE/scripts/ai/sanitize_tests.py
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Show sanitized test files (debug)
        run: |
          echo "=== smoke ===" && cat generated-tests/smoke/*.py 2>/dev/null || true
          echo "=== sanity ===" && cat generated-tests/sanity/*.py 2>/dev/null || true
          echo "=== api ===" && cat generated-tests/api/test_*.py 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: generated-tests
          path: generated-tests/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # STAGE 2 — SMOKE  (pipeline gate)
  # ─────────────────────────────────────────────────────────────
  smoke:
    name: 💨 Smoke Tests
    runs-on: ubuntu-latest
    needs: detect-and-generate

    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: generated-tests
          path: generated-tests/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install --break-system-packages pytest pytest-json-report httpx requests flask
          [ -f requirements.txt ] && pip install --break-system-packages -r requirements.txt || true

      - name: Start application
        run: |
          if   [ -f "sample-app/app.py" ]; then
            pip install --break-system-packages flask
            python sample-app/app.py &
          elif [ -f "app.py"   ]; then python app.py &
          elif [ -f "main.py"  ]; then python main.py &
          elif [ -f "manage.py"]; then python manage.py runserver 0.0.0.0:3000 &
          elif [ -f "package.json" ]; then npm ci --quiet && npm start &
          fi

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 20); do
            if curl -sf "${{ inputs.base-url }}/health" > /dev/null 2>&1; then
              echo "✅ App ready after ${i} attempts"; break
            fi
            echo "  attempt ${i}/20 — sleeping 3s" && sleep 3
          done

      - name: 💨 Run smoke tests
        run: |
          pytest generated-tests/smoke/ \
            --json-report --json-report-file=smoke-results.json \
            -v --tb=short || true

      - name: 🚦 Smoke gate check
        run: python $GITHUB_WORKSPACE/scripts/smoke/check_results.py smoke-results.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-results
          path: smoke-results.json

  # ─────────────────────────────────────────────────────────────
  # STAGE 3a — SANITY  (parallel with API)
  # ─────────────────────────────────────────────────────────────
  sanity:
    name: 🔍 Sanity Tests
    runs-on: ubuntu-latest
    needs: [detect-and-generate, smoke]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: generated-tests
          path: generated-tests/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install --break-system-packages pytest pytest-json-report httpx requests flask
          [ -f requirements.txt ] && pip install --break-system-packages -r requirements.txt || true

      - name: Start application
        run: |
          if   [ -f "sample-app/app.py" ]; then
            pip install --break-system-packages flask && python sample-app/app.py &
          elif [ -f "app.py"   ]; then python app.py &
          elif [ -f "main.py"  ]; then python main.py &
          elif [ -f "manage.py"]; then python manage.py runserver 0.0.0.0:3000 &
          elif [ -f "package.json" ]; then npm ci --quiet && npm start &
          fi

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 20); do
            curl -sf "${{ inputs.base-url }}/health" > /dev/null 2>&1 && \
              echo "✅ App ready" && break
            echo "  attempt ${i}/20" && sleep 3
          done

      - name: 🔍 Run sanity tests
        run: |
          pytest generated-tests/sanity/ \
            --json-report --json-report-file=sanity-results.json \
            -v --tb=short || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sanity-results
          path: sanity-results.json

  # ─────────────────────────────────────────────────────────────
  # STAGE 3b — API TESTS  (parallel with sanity)
  # ─────────────────────────────────────────────────────────────
  api-tests:
    name: 🔌 API Tests
    runs-on: ubuntu-latest
    needs: [detect-and-generate, smoke]
    if: needs.detect-and-generate.outputs.has-api == 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: generated-tests
          path: generated-tests/

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          npm install -g newman newman-reporter-htmlextra --quiet
          pip install --break-system-packages pytest pytest-json-report httpx requests flask
          [ -f requirements.txt ] && pip install --break-system-packages -r requirements.txt || true

      - name: Start application
        run: |
          if   [ -f "sample-app/app.py" ]; then
            pip install --break-system-packages flask && python sample-app/app.py &
          elif [ -f "app.py"   ]; then python app.py &
          elif [ -f "main.py"  ]; then python main.py &
          elif [ -f "manage.py"]; then python manage.py runserver 0.0.0.0:3000 &
          elif [ -f "package.json" ]; then npm ci --quiet && npm start &
          fi

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 20); do
            curl -sf "${{ inputs.base-url }}/health" > /dev/null 2>&1 && \
              echo "✅ App ready" && break
            echo "  attempt ${i}/20" && sleep 3
          done

      - name: 🔌 Run Newman collection
        if: hashFiles('generated-tests/api/collection.json') != ''
        run: |
          newman run generated-tests/api/collection.json \
            --reporters cli,json \
            --reporter-json-export api-newman-results.json \
            --env-var "BASE_URL=${{ inputs.base-url }}" || true

      - name: 🔌 Run pytest API tests
        run: |
          pytest generated-tests/api/ \
            --json-report --json-report-file=api-results.json \
            -v --tb=short \
            --ignore=generated-tests/api/collection.json || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-results
          path: |
            api-results.json
            api-newman-results.json

  # ─────────────────────────────────────────────────────────────
  # STAGE 4 — REGRESSION
  # ─────────────────────────────────────────────────────────────
  regression:
    name: 🔁 Regression Tests
    runs-on: ubuntu-latest
    needs: [detect-and-generate, sanity, api-tests]
    if: always() && needs.smoke.result == 'success'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: generated-tests
          path: generated-tests/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install --break-system-packages \
            pytest pytest-json-report httpx requests flask playwright pytest-playwright
          [ -f requirements.txt ] && pip install --break-system-packages -r requirements.txt || true
          python -m playwright install chromium --with-deps

      - name: Start application
        run: |
          if   [ -f "sample-app/app.py" ]; then
            pip install --break-system-packages flask && python sample-app/app.py &
          elif [ -f "app.py"   ]; then python app.py &
          elif [ -f "main.py"  ]; then python main.py &
          elif [ -f "manage.py"]; then python manage.py runserver 0.0.0.0:3000 &
          elif [ -f "package.json" ]; then npm ci --quiet && npm start &
          fi

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 20); do
            curl -sf "${{ inputs.base-url }}/health" > /dev/null 2>&1 && \
              echo "✅ App ready" && break
            echo "  attempt ${i}/20" && sleep 3
          done

      - name: 🔁 Run regression tests
        run: |
          pytest generated-tests/regression/ \
            --json-report --json-report-file=regression-py-results.json \
            -v --tb=short || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-results
          path: regression-py-results.json

  # ─────────────────────────────────────────────────────────────
  # STAGE 5 — UAT
  # ─────────────────────────────────────────────────────────────
  uat:
    name: 👤 UAT Tests
    runs-on: ubuntu-latest
    needs: [detect-and-generate, smoke]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: generated-tests
          path: generated-tests/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install --break-system-packages \
            pytest pytest-json-report playwright pytest-playwright flask httpx requests
          [ -f requirements.txt ] && pip install --break-system-packages -r requirements.txt || true
          python -m playwright install chromium --with-deps

      - name: Start application
        run: |
          if   [ -f "sample-app/app.py" ]; then
            pip install --break-system-packages flask && python sample-app/app.py &
          elif [ -f "app.py"   ]; then python app.py &
          elif [ -f "main.py"  ]; then python main.py &
          elif [ -f "manage.py"]; then python manage.py runserver 0.0.0.0:3000 &
          elif [ -f "package.json" ]; then npm ci --quiet && npm start &
          fi

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 20); do
            curl -sf "${{ inputs.base-url }}/health" > /dev/null 2>&1 && \
              echo "✅ App ready" && break
            echo "  attempt ${i}/20" && sleep 3
          done

      - name: 👤 Run UAT tests
        run: |
          pytest generated-tests/uat/ \
            --json-report --json-report-file=uat-results.json \
            -v --tb=short || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: uat-results
          path: uat-results.json

  # ─────────────────────────────────────────────────────────────
  # STAGE 6a — LOAD
  # ─────────────────────────────────────────────────────────────
  load-test:
    name: 📈 Load Tests
    runs-on: ubuntu-latest
    needs: [smoke]
    if: inputs.run-load == true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: generated-tests
          path: generated-tests/

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq && sudo apt-get install k6 -y

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Start application
        run: |
          pip install --break-system-packages flask
          if   [ -f "sample-app/app.py" ]; then python sample-app/app.py &
          elif [ -f "app.py"   ]; then python app.py &
          elif [ -f "main.py"  ]; then python main.py &
          elif [ -f "package.json" ]; then npm ci --quiet && npm start &
          fi

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 20); do
            curl -sf "${{ inputs.base-url }}/health" > /dev/null 2>&1 && \
              echo "✅ App ready" && break
            echo "  attempt ${i}/20" && sleep 3
          done

      - name: 📈 Run load test
        run: |
          k6 run generated-tests/load/load-test.js \
            --vus ${{ inputs.load-vus }} \
            --duration 60s \
            --out json=load-results.json \
            -e BASE_URL=${{ inputs.base-url }} || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-results
          path: load-results.json

  # ─────────────────────────────────────────────────────────────
  # STAGE 6b — STRESS (nightly only)
  # ─────────────────────────────────────────────────────────────
  stress-test:
    name: 💥 Stress Tests
    runs-on: ubuntu-latest
    needs: [smoke]
    if: inputs.run-stress == true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: generated-tests
          path: generated-tests/

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq && sudo apt-get install k6 -y

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Start application
        run: |
          pip install --break-system-packages flask
          if   [ -f "sample-app/app.py" ]; then python sample-app/app.py &
          elif [ -f "app.py"   ]; then python app.py &
          elif [ -f "main.py"  ]; then python main.py &
          elif [ -f "package.json" ]; then npm ci --quiet && npm start &
          fi

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 20); do
            curl -sf "${{ inputs.base-url }}/health" > /dev/null 2>&1 && \
              echo "✅ App ready" && break
            echo "  attempt ${i}/20" && sleep 3
          done

      - name: 💥 Run stress test
        run: |
          k6 run generated-tests/load/stress-test.js \
            --out json=stress-results.json \
            -e BASE_URL=${{ inputs.base-url }} || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-results
          path: stress-results.json

  # ─────────────────────────────────────────────────────────────
  # STAGE 7 — REPORT
  # ─────────────────────────────────────────────────────────────
  report:
    name: 📊 Generate Report
    runs-on: ubuntu-latest
    needs: [smoke, sanity, api-tests, regression, uat, load-test]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: all-results/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install report deps
        run: pip install openai jinja2 --break-system-packages

      - name: 📊 Generate HTML report
        run: |
          python $GITHUB_WORKSPACE/scripts/report/generate_report.py \
            --results-dir all-results/ \
            --project     "${{ inputs.project-name }}" \
            --commit      "${{ github.sha }}" \
            --branch      "${{ github.ref_name }}" \
            --model       "${{ inputs.openai-model }}" \
            --output      qa-report.html
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 💾 Save report artifact (30 days)
        uses: actions/upload-artifact@v4
        with:
          name: qa-report-${{ github.sha }}
          path: qa-report.html
          retention-days: 30

      - name: 💬 Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary;
            try {
              summary = JSON.parse(fs.readFileSync('all-results/report-summary.json', 'utf8'));
            } catch(e) {
              summary = {
                total:0, passed:0, failed:0, ai_summary:'Report data unavailable.',
                smoke:{passed:0,failed:0,skipped:0}, sanity:{passed:0,failed:0,skipped:0},
                api:{passed:0,failed:0,skipped:0}, regression:{passed:0,failed:0,skipped:0},
                uat:{passed:0,failed:0,skipped:0}, load:{p95:0,errors:0,vus:0}
              };
            }
            const emoji = summary.failed === 0 ? '✅' : '❌';
            const s = summary;
            const body = `## ${emoji} QA Report — ${{ inputs.project-name }}

            | Suite | ✅ Passed | ❌ Failed | ⊘ Skipped |
            |-------|-----------|-----------|-----------|
            | 💨 Smoke      | ${s.smoke?.passed??0}      | ${s.smoke?.failed??0}      | ${s.smoke?.skipped??0}      |
            | 🔍 Sanity     | ${s.sanity?.passed??0}     | ${s.sanity?.failed??0}     | ${s.sanity?.skipped??0}     |
            | 🔌 API        | ${s.api?.passed??0}        | ${s.api?.failed??0}        | ${s.api?.skipped??0}        |
            | 🔁 Regression | ${s.regression?.passed??0} | ${s.regression?.failed??0} | ${s.regression?.skipped??0} |
            | 👤 UAT        | ${s.uat?.passed??0}        | ${s.uat?.failed??0}        | ${s.uat?.skipped??0}        |
            | 📈 Load       | p95: ${s.load?.p95??0}ms   | errors: ${s.load?.errors??0}% | — |

            **Total: ${s.passed} / ${s.total} passed**
            🤖 **AI Analysis:** ${s.ai_summary}
            📊 [View Full Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
                        github.rest.issues.createComment({
                          issue_number: context.issue.number,
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          body
                        });