name: Universal QA Pipeline

on:
  workflow_call:
    inputs:
      project-name:
        required: true
        type: string
      base-url:
        required: false
        type: string
        default: "http://localhost:3000"
      run-stress:
        required: false
        type: boolean
        default: false
      run-load:
        required: false
        type: boolean
        default: true
      load-vus:
        required: false
        type: number
        default: 50
      openai-model:
        required: false
        type: string
        default: "gpt-4o-mini"
    secrets:
      OPENAI_API_KEY:
        required: true

jobs:

  detect-and-generate:
    name: "AI: Detect Stack & Generate Tests"
    runs-on: ubuntu-latest
    outputs:
      language:  ${{ steps.detect.outputs.language }}
      framework: ${{ steps.detect.outputs.framework }}
      has-api:   ${{ steps.detect.outputs.has-api }}

    steps:
      - name: Checkout project repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          path: project

      - name: Checkout QA platform scripts
        uses: actions/checkout@v4
        with:
          repository: HariniMuruganantham/Automatic-QA-CiCd
          ref: main
          path: qa-platform

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install script dependencies
        run: pip install openai --break-system-packages

      - name: Detect stack
        id: detect
        run: python $GITHUB_WORKSPACE/qa-platform/scripts/detect_stack.py
        env:
          WORKSPACE: ${{ github.workspace }}/project

      - name: Generate tests via OpenAI
        id: generate
        run: python $GITHUB_WORKSPACE/qa-platform/scripts/ai/generate_tests.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL:   ${{ inputs.openai-model }}
          LANGUAGE:       ${{ steps.detect.outputs.language }}
          FRAMEWORK:      ${{ steps.detect.outputs.framework }}
          CHANGED_FILES:  ${{ steps.detect.outputs.changed-files }}
          PROJECT_NAME:   ${{ inputs.project-name }}
          WORKSPACE:      ${{ github.workspace }}/project

      - name: Upload generated tests
        uses: actions/upload-artifact@v4
        with:
          name: generated-tests
          path: generated-tests/
          retention-days: 7

  smoke:
    name: "Smoke Tests"
    runs-on: ubuntu-latest
    needs: detect-and-generate

    steps:
      - name: Checkout project repo
        uses: actions/checkout@v4
        with:
          path: project

      - name: Checkout QA platform scripts
        uses: actions/checkout@v4
        with:
          repository: HariniMuruganantham/Automatic-QA-CiCd
          ref: main
          path: qa-platform

      - uses: actions/download-artifact@v4
        with:
          name: generated-tests
          path: generated-tests/

      - uses: actions/setup-node@v4
        if: needs.detect-and-generate.outputs.language == 'javascript'
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        if: needs.detect-and-generate.outputs.language == 'python'
        with:
          python-version: "3.11"

      - name: Install JS deps and jest config
        if: needs.detect-and-generate.outputs.language == 'javascript'
        run: |
          if [ -f package.json ]; then npm ci 2>/dev/null || npm install; fi
          npm install -g jest ts-jest typescript @types/jest
          if [ ! -f jest.config.js ] && [ ! -f jest.config.ts ] && [ ! -f jest.config.json ]; then
            printf '%s\n' \
              'module.exports = {' \
              '  testEnvironment: "node",' \
              '  transform: { "^.+\\.tsx?$": ["ts-jest", { tsconfig: { strict: false } }] },' \
              '  testMatch: ["**/*.test.ts","**/*.test.js","**/*.spec.ts","**/*.spec.js"],' \
              '  moduleFileExtensions: ["ts","tsx","js","jsx","json"],' \
              '};' > jest.config.js
            echo "Wrote jest.config.js"
          fi

      - name: Install Python deps
        if: needs.detect-and-generate.outputs.language == 'python'
        run: |
          pip install --break-system-packages \
            pytest pytest-json-report requests httpx \
            $([ -f requirements.txt ] && echo "-r requirements.txt" || echo "")

      - name: Start application
        run: |
          if [ -f "package.json" ]; then npm start &
          elif [ -f "manage.py" ]; then python manage.py runserver &
          elif [ -f "app.py" ]; then python app.py &
          elif [ -f "main.py" ]; then python main.py &
          fi
          sleep 6

      - name: Run smoke tests (JS)
        if: needs.detect-and-generate.outputs.language == 'javascript'
        run: npx jest generated-tests/smoke/ --json --outputFile=smoke-results.json || true

      - name: Run smoke tests (Python)
        if: needs.detect-and-generate.outputs.language == 'python'
        run: pytest generated-tests/smoke/ --json-report --json-report-file=smoke-results.json -v || true

      - name: Smoke gate check
        run: python $GITHUB_WORKSPACE/qa-platform/scripts/smoke/check_results.py smoke-results.json

      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: smoke-results.json

  sanity:
    name: "Sanity Tests"
    runs-on: ubuntu-latest
    needs: [detect-and-generate, smoke]

    steps:
      - name: Checkout project repo
        uses: actions/checkout@v4
        with:
          path: project

      - name: Checkout QA platform scripts
        uses: actions/checkout@v4
        with:
          repository: HariniMuruganantham/Automatic-QA-CiCd
          ref: main
          path: qa-platform

      - uses: actions/download-artifact@v4
        with:
          name: generated-tests
          path: generated-tests/

      - uses: actions/setup-node@v4
        if: needs.detect-and-generate.outputs.language == 'javascript'
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        if: needs.detect-and-generate.outputs.language == 'python'
        with:
          python-version: "3.11"

      - name: Install JS deps and run sanity
        if: needs.detect-and-generate.outputs.language == 'javascript'
        run: |
          if [ -f package.json ]; then npm ci 2>/dev/null || npm install; fi
          npm install -g jest ts-jest typescript @types/jest
          if [ ! -f jest.config.js ] && [ ! -f jest.config.ts ] && [ ! -f jest.config.json ]; then
            printf '%s\n' \
              'module.exports = {' \
              '  testEnvironment: "node",' \
              '  transform: { "^.+\\.tsx?$": ["ts-jest", { tsconfig: { strict: false } }] },' \
              '  testMatch: ["**/*.test.ts","**/*.test.js","**/*.spec.ts","**/*.spec.js"],' \
              '  moduleFileExtensions: ["ts","tsx","js","jsx","json"],' \
              '};' > jest.config.js
          fi
          npx jest generated-tests/sanity/ --json --outputFile=sanity-results.json || true

      - name: Install Python deps and run sanity
        if: needs.detect-and-generate.outputs.language == 'python'
        run: |
          pip install --break-system-packages \
            pytest pytest-json-report requests httpx \
            $([ -f requirements.txt ] && echo "-r requirements.txt" || echo "") || true
          pytest generated-tests/sanity/ --json-report --json-report-file=sanity-results.json -v || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sanity-results
          path: sanity-results.json

  api-tests:
    name: "API Tests"
    runs-on: ubuntu-latest
    needs: [detect-and-generate, smoke]
    if: needs.detect-and-generate.outputs.has-api == 'true'

    steps:
      - name: Checkout project repo
        uses: actions/checkout@v4
        with:
          path: project

      - name: Checkout QA platform scripts
        uses: actions/checkout@v4
        with:
          repository: HariniMuruganantham/Automatic-QA-CiCd
          ref: main
          path: qa-platform

      - uses: actions/download-artifact@v4
        with:
          name: generated-tests
          path: generated-tests/

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Newman and Python deps
        run: |
          npm install -g newman newman-reporter-htmlextra
          pip install --break-system-packages httpx pytest pytest-json-report requests

      - name: Start application
        run: |
          if [ -f "package.json" ]; then
            npm ci 2>/dev/null || npm install
            npm start &
          fi
          if [ -f "app.py" ]; then
            pip install --break-system-packages \
              $([ -f requirements.txt ] && echo "-r requirements.txt" || echo "flask fastapi uvicorn") || true
            python app.py &
          fi
          sleep 6

      - name: Run Newman collection
        if: hashFiles('generated-tests/api/collection.json') != ''
        run: |
          newman run generated-tests/api/collection.json \
            --reporters cli,json \
            --reporter-json-export api-newman-results.json \
            --env-var "BASE_URL=${{ inputs.base-url }}" || true

      - name: Run pytest API tests
        run: |
          pytest generated-tests/api/ \
            --json-report --json-report-file=api-results.json -v \
            --ignore=generated-tests/api/collection.json || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-results
          path: |
            api-results.json
            api-newman-results.json

  regression:
    name: "Regression Tests"
    runs-on: ubuntu-latest
    needs: [detect-and-generate, smoke, sanity, api-tests]
    if: always() && needs.smoke.result == 'success'

    steps:
      - name: Checkout project repo
        uses: actions/checkout@v4
        with:
          path: project

      - name: Checkout QA platform scripts
        uses: actions/checkout@v4
        with:
          repository: HariniMuruganantham/Automatic-QA-CiCd
          ref: main
          path: qa-platform

      - uses: actions/download-artifact@v4
        with:
          name: generated-tests
          path: generated-tests/

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright and pytest
        run: |
          npm install -g @playwright/test
          npx playwright install --with-deps chromium
          pip install --break-system-packages \
            pytest playwright pytest-playwright pytest-json-report

      - name: Start application
        run: |
          if [ -f "package.json" ]; then
            npm ci 2>/dev/null || npm install
            npm start &
          fi
          if [ -f "app.py" ]; then
            pip install --break-system-packages \
              $([ -f requirements.txt ] && echo "-r requirements.txt" || echo "") || true
            python app.py &
          fi
          sleep 6

      - name: Run regression with Playwright
        run: npx playwright test generated-tests/regression/ --reporter=json --output=regression-pw-results/ || true

      - name: Run regression with pytest
        run: pytest generated-tests/regression/ --json-report --json-report-file=regression-py-results.json -v || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-results
          path: |
            regression-pw-results/
            regression-py-results.json

  uat:
    name: "UAT Tests"
    runs-on: ubuntu-latest
    needs: [detect-and-generate, smoke]

    steps:
      - name: Checkout project repo
        uses: actions/checkout@v4
        with:
          path: project

      - name: Checkout QA platform scripts
        uses: actions/checkout@v4
        with:
          repository: HariniMuruganantham/Automatic-QA-CiCd
          ref: main
          path: qa-platform

      - uses: actions/download-artifact@v4
        with:
          name: generated-tests
          path: generated-tests/

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm install -g @playwright/test
          npx playwright install --with-deps chromium

      - name: Start application
        run: |
          if [ -f "package.json" ]; then
            npm ci 2>/dev/null || npm install
            npm start &
          fi
          if [ -f "app.py" ]; then
            pip install --break-system-packages \
              $([ -f requirements.txt ] && echo "-r requirements.txt" || echo "") || true
            python app.py &
          fi
          sleep 8

      - name: Run UAT with Playwright
        run: npx playwright test generated-tests/uat/ --reporter=json --output=uat-results/ || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: uat-results
          path: uat-results/

  load-test:
    name: "Load Tests"
    runs-on: ubuntu-latest
    needs: [smoke]
    if: inputs.run-load == true

    steps:
      - name: Checkout project repo
        uses: actions/checkout@v4
        with:
          path: project

      - name: Checkout QA platform scripts
        uses: actions/checkout@v4
        with:
          repository: HariniMuruganantham/Automatic-QA-CiCd
          ref: main
          path: qa-platform

      - uses: actions/download-artifact@v4
        with:
          name: generated-tests
          path: generated-tests/

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq && sudo apt-get install k6 -y

      - name: Start application
        run: |
          if [ -f "package.json" ]; then
            npm ci 2>/dev/null || npm install
            npm start &
          fi
          if [ -f "app.py" ]; then
            pip install --break-system-packages \
              $([ -f requirements.txt ] && echo "-r requirements.txt" || echo "") || true
            python app.py &
          fi
          sleep 8

      - name: Run load test
        run: |
          k6 run generated-tests/load/load-test.js \
            --vus ${{ inputs.load-vus }} \
            --duration 60s \
            --out json=load-results.json \
            -e BASE_URL=${{ inputs.base-url }} || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-results
          path: load-results.json

  stress-test:
    name: "Stress Tests"
    runs-on: ubuntu-latest
    needs: [smoke]
    if: inputs.run-stress == true

    steps:
      - name: Checkout project repo
        uses: actions/checkout@v4
        with:
          path: project

      - name: Checkout QA platform scripts
        uses: actions/checkout@v4
        with:
          repository: HariniMuruganantham/Automatic-QA-CiCd
          ref: main
          path: qa-platform

      - uses: actions/download-artifact@v4
        with:
          name: generated-tests
          path: generated-tests/

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq && sudo apt-get install k6 -y

      - name: Start application
        run: |
          if [ -f "package.json" ]; then
            npm ci 2>/dev/null || npm install
            npm start &
          fi
          if [ -f "app.py" ]; then
            pip install --break-system-packages \
              $([ -f requirements.txt ] && echo "-r requirements.txt" || echo "") || true
            python app.py &
          fi
          sleep 8

      - name: Run stress test
        run: |
          k6 run generated-tests/load/stress-test.js \
            --out json=stress-results.json \
            -e BASE_URL=${{ inputs.base-url }} || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-results
          path: stress-results.json

  report:
    name: "Generate Report"
    runs-on: ubuntu-latest
    needs: [smoke, sanity, api-tests, regression, uat, load-test]
    if: always()

    steps:
      - name: Checkout QA platform scripts
        uses: actions/checkout@v4
        with:
          repository: HariniMuruganantham/Automatic-QA-CiCd
          ref: main
          path: qa-platform

      - uses: actions/download-artifact@v4
        with:
          path: all-results/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install report dependencies
        run: pip install openai jinja2 --break-system-packages

      - name: Generate HTML report
        run: |
          python $GITHUB_WORKSPACE/qa-platform/scripts/report/generate_report.py \
            --results-dir all-results/ \
            --project "${{ inputs.project-name }}" \
            --commit "${{ github.sha }}" \
            --branch "${{ github.ref_name }}" \
            --model "${{ inputs.openai-model }}" \
            --output qa-report.html
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Save report artifact
        uses: actions/upload-artifact@v4
        with:
          name: qa-report-${{ github.sha }}
          path: qa-report.html
          retention-days: 30

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let s;
            try {
              s = JSON.parse(fs.readFileSync('all-results/report-summary.json', 'utf8'));
            } catch(e) {
              s = { total:0, passed:0, failed:0, ai_summary:'Report data unavailable.',
                smoke:{passed:0,failed:0,skipped:0}, sanity:{passed:0,failed:0,skipped:0},
                api:{passed:0,failed:0,skipped:0}, regression:{passed:0,failed:0,skipped:0},
                uat:{passed:0,failed:0,skipped:0}, load:{p95:0,errors:0,vus:0} };
            }
            const emoji = s.failed === 0 ? '✅' : '❌';
            const body = [
              `## ${emoji} QA Report — ${{ inputs.project-name }}`,
              `| Suite | ✅ Passed | ❌ Failed | ⊘ Skipped |`,
              `|-------|-----------|-----------|-----------|`,
              `| 💨 Smoke      | ${s.smoke?.passed??0}      | ${s.smoke?.failed??0}      | ${s.smoke?.skipped??0}      |`,
              `| 🔍 Sanity     | ${s.sanity?.passed??0}     | ${s.sanity?.failed??0}     | ${s.sanity?.skipped??0}     |`,
              `| 🔌 API        | ${s.api?.passed??0}        | ${s.api?.failed??0}        | ${s.api?.skipped??0}        |`,
              `| 🔁 Regression | ${s.regression?.passed??0} | ${s.regression?.failed??0} | ${s.regression?.skipped??0} |`,
              `| 👤 UAT        | ${s.uat?.passed??0}        | ${s.uat?.failed??0}        | ${s.uat?.skipped??0}        |`,
              `| 📈 Load       | p95: ${s.load?.p95??0}ms   | errors: ${s.load?.errors??0}% | — |`,
              `**Total: ${s.passed} / ${s.total} passed**`,
              `🤖 **AI Analysis:** ${s.ai_summary}`,
              `📊 [View Full Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });