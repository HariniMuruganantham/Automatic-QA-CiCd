name: Universal QA Pipeline

on:
  workflow_call:
    inputs:
      project-name:
        required: true
        type: string
      base-url:
        required: false
        type: string
        default: "http://localhost:3000"
      run-stress:
        required: false
        type: boolean
        default: false
      run-load:
        required: false
        type: boolean
        default: true
      load-vus:
        required: false
        type: number
        default: 50
      openai-model:
        required: false
        type: string
        default: "gpt-4o-mini"
    secrets:
      OPENAI_API_KEY:
        required: true

jobs:

  detect-and-generate:
    name: "AI: Detect Stack & Generate Tests"
    runs-on: ubuntu-latest
    outputs:
      language:  ${{ steps.detect.outputs.language }}
      framework: ${{ steps.detect.outputs.framework }}
      has-api:   ${{ steps.detect.outputs.has-api }}

    steps:
      - name: Checkout project repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          path: project

      - name: Checkout QA platform scripts
        uses: actions/checkout@v4
        with:
          repository: HariniMuruganantham/Automatic-QA-CiCd
          ref: main
          path: qa-platform

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install script dependencies
        run: pip install openai --break-system-packages

      - name: Detect stack
        id: detect
        run: python $GITHUB_WORKSPACE/qa-platform/scripts/detect_stack.py
        env:
          WORKSPACE: ${{ github.workspace }}/project
          BASE_URL:  ${{ inputs.base-url }}

      - name: Generate tests via OpenAI
        id: generate
        run: python $GITHUB_WORKSPACE/qa-platform/scripts/ai/generate_tests.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL:   ${{ inputs.openai-model }}
          LANGUAGE:       ${{ steps.detect.outputs.language }}
          FRAMEWORK:      ${{ steps.detect.outputs.framework }}
          CHANGED_FILES:  ${{ steps.detect.outputs.changed-files }}
          PROJECT_NAME:   ${{ inputs.project-name }}
          BASE_URL:       ${{ inputs.base-url }}
          WORKSPACE:      ${{ github.workspace }}/project

      - name: Upload generated tests
        uses: actions/upload-artifact@v4
        with:
          name: generated-tests
          path: generated-tests/
          retention-days: 7

  smoke:
    name: "Smoke Tests"
    runs-on: ubuntu-latest
    needs: detect-and-generate

    steps:
      - name: Checkout project repo
        uses: actions/checkout@v4
        with:
          path: project

      - name: Checkout QA platform scripts
        uses: actions/checkout@v4
        with:
          repository: HariniMuruganantham/Automatic-QA-CiCd
          ref: main
          path: qa-platform

      - uses: actions/download-artifact@v4
        with:
          name: generated-tests
          path: generated-tests/

      - uses: actions/setup-node@v4
        if: needs.detect-and-generate.outputs.language == 'javascript'
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        if: needs.detect-and-generate.outputs.language == 'python'
        with:
          python-version: "3.11"

      - name: Install JS deps and setup Jest
        if: needs.detect-and-generate.outputs.language == 'javascript'
        run: bash $GITHUB_WORKSPACE/qa-platform/scripts/helpers/setup_jest.sh "${{ github.workspace }}/project"

      - name: Install Python deps
        if: needs.detect-and-generate.outputs.language == 'python'
        run: |
          BASE="${{ github.workspace }}/project"
          pip install --break-system-packages \
            pytest pytest-json-report requests httpx \
            $([ -f "$BASE/requirements.txt" ] && echo "-r $BASE/requirements.txt" || echo "")

      - name: Start application
        run: bash $GITHUB_WORKSPACE/qa-platform/scripts/helpers/start_app.sh "${{ github.workspace }}/project" "${{ inputs.base-url }}"

      - name: Install Playwright for smoke
        if: needs.detect-and-generate.outputs.language == 'javascript'
        run: |
          npm install -g @playwright/test
          npx playwright install --with-deps chromium

      - name: Run smoke tests (JS)
        if: needs.detect-and-generate.outputs.language == 'javascript'
        run: |
          npx playwright test generated-tests/smoke/ \
            --reporter=json \
            --config=/dev/null \
            2>/dev/null | tee smoke-pw.json || true
          python3 $GITHUB_WORKSPACE/qa-platform/scripts/smoke/pw_to_jest.py smoke-pw.json smoke-results.json

      - name: Run smoke tests (Python)
        if: needs.detect-and-generate.outputs.language == 'python'
        run: pytest generated-tests/smoke/ --json-report --json-report-file=smoke-results.json -v || true

      - name: Smoke gate check
        run: python $GITHUB_WORKSPACE/qa-platform/scripts/smoke/check_results.py smoke-results.json

      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: smoke-results.json

  sanity:
    name: "Sanity Tests"
    runs-on: ubuntu-latest
    needs: [detect-and-generate, smoke]

    steps:
      - name: Checkout project repo
        uses: actions/checkout@v4
        with:
          path: project

      - name: Checkout QA platform scripts
        uses: actions/checkout@v4
        with:
          repository: HariniMuruganantham/Automatic-QA-CiCd
          ref: main
          path: qa-platform

      - uses: actions/download-artifact@v4
        with:
          name: generated-tests
          path: generated-tests/

      - uses: actions/setup-node@v4
        if: needs.detect-and-generate.outputs.language == 'javascript'
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        if: needs.detect-and-generate.outputs.language == 'python'
        with:
          python-version: "3.11"

      - name: Install JS deps and setup Jest
        if: needs.detect-and-generate.outputs.language == 'javascript'
        run: bash $GITHUB_WORKSPACE/qa-platform/scripts/helpers/setup_jest.sh "${{ github.workspace }}/project"

      - name: Install Python deps
        if: needs.detect-and-generate.outputs.language == 'python'
        run: |
          BASE="${{ github.workspace }}/project"
          pip install --break-system-packages \
            pytest pytest-json-report requests httpx \
            $([ -f "$BASE/requirements.txt" ] && echo "-r $BASE/requirements.txt" || echo "") || true

      - name: Start application
        run: bash $GITHUB_WORKSPACE/qa-platform/scripts/helpers/start_app.sh "${{ github.workspace }}/project" "${{ inputs.base-url }}"

      - name: Run sanity tests (JS)
        if: needs.detect-and-generate.outputs.language == 'javascript'
        run: npx jest generated-tests/sanity/ --json --outputFile=sanity-results.json || true

      - name: Run sanity tests (Python)
        if: needs.detect-and-generate.outputs.language == 'python'
        run: pytest generated-tests/sanity/ --json-report --json-report-file=sanity-results.json -v || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sanity-results
          path: sanity-results.json

  api-tests:
    name: "API Tests"
    runs-on: ubuntu-latest
    needs: [detect-and-generate, smoke]
    if: needs.detect-and-generate.outputs.has-api == 'true'

    steps:
      - name: Checkout project repo
        uses: actions/checkout@v4
        with:
          path: project

      - name: Checkout QA platform scripts
        uses: actions/checkout@v4
        with:
          repository: HariniMuruganantham/Automatic-QA-CiCd
          ref: main
          path: qa-platform

      - uses: actions/download-artifact@v4
        with:
          name: generated-tests
          path: generated-tests/

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Newman and Python deps
        run: |
          npm install -g newman newman-reporter-htmlextra
          pip install --break-system-packages httpx pytest pytest-json-report requests

      - name: Start application
        run: bash $GITHUB_WORKSPACE/qa-platform/scripts/helpers/start_app.sh "${{ github.workspace }}/project" "${{ inputs.base-url }}"

      - name: Run Newman collection
        if: hashFiles('generated-tests/api/collection.json') != ''
        run: |
          newman run generated-tests/api/collection.json \
            --reporters cli,json \
            --reporter-json-export api-newman-results.json \
            --env-var "BASE_URL=${{ inputs.base-url }}" || true

      - name: Run Jest API tests (JS)
        if: needs.detect-and-generate.outputs.language == 'javascript'
        run: |
          npm install -g jest ts-jest typescript @types/jest axios node-fetch
          if [ ! -f jest.config.js ]; then
            printf 'module.exports = {\n  testEnvironment: "node",\n  transform: { "^.+\\.tsx?$": ["ts-jest", { tsconfig: { strict: false } }] },\n};\n' > jest.config.js
          fi
          npx jest generated-tests/api/ --json --outputFile=api-results.json || true

      - name: Run pytest API tests (Python)
        if: needs.detect-and-generate.outputs.language == 'python'
        run: |
          pytest generated-tests/api/ \
            --json-report --json-report-file=api-results.json -v \
            --ignore=generated-tests/api/collection.json || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-results
          path: |
            api-results.json
            api-newman-results.json

  regression:
    name: "Regression Tests"
    runs-on: ubuntu-latest
    needs: [detect-and-generate, smoke, sanity, api-tests]
    if: always() && needs.smoke.result == 'success'

    steps:
      - name: Checkout project repo
        uses: actions/checkout@v4
        with:
          path: project

      - name: Checkout QA platform scripts
        uses: actions/checkout@v4
        with:
          repository: HariniMuruganantham/Automatic-QA-CiCd
          ref: main
          path: qa-platform

      - uses: actions/download-artifact@v4
        with:
          name: generated-tests
          path: generated-tests/

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install JS deps and setup Jest
        if: needs.detect-and-generate.outputs.language == 'javascript'
        run: |
          bash $GITHUB_WORKSPACE/qa-platform/scripts/helpers/setup_jest.sh "${{ github.workspace }}/project"
          npm install -g @playwright/test
          npx playwright install --with-deps chromium

      - name: Install Python deps
        if: needs.detect-and-generate.outputs.language == 'python'
        run: |
          pip install --break-system-packages \
            pytest playwright pytest-playwright pytest-json-report
          python -m playwright install --with-deps chromium

      - name: Start application
        run: bash $GITHUB_WORKSPACE/qa-platform/scripts/helpers/start_app.sh "${{ github.workspace }}/project" "${{ inputs.base-url }}"

      - name: Run regression tests (JS)
        if: needs.detect-and-generate.outputs.language == 'javascript'
        run: npx jest generated-tests/regression/ --json --outputFile=regression-results.json || true

      - name: Run regression tests (Python)
        if: needs.detect-and-generate.outputs.language == 'python'
        run: pytest generated-tests/regression/ --json-report --json-report-file=regression-results.json -v || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-results
          path: regression-results.json

  uat:
    name: "UAT Tests"
    runs-on: ubuntu-latest
    needs: [detect-and-generate, smoke]

    steps:
      - name: Checkout project repo
        uses: actions/checkout@v4
        with:
          path: project

      - name: Checkout QA platform scripts
        uses: actions/checkout@v4
        with:
          repository: HariniMuruganantham/Automatic-QA-CiCd
          ref: main
          path: qa-platform

      - uses: actions/download-artifact@v4
        with:
          name: generated-tests
          path: generated-tests/

      - uses: actions/setup-node@v4
        if: needs.detect-and-generate.outputs.language == 'javascript'
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        if: needs.detect-and-generate.outputs.language == 'python'
        with:
          python-version: "3.11"

      - name: Install Playwright (JS)
        if: needs.detect-and-generate.outputs.language == 'javascript'
        run: |
          npm install -g @playwright/test
          npx playwright install --with-deps chromium

      - name: Install Playwright (Python)
        if: needs.detect-and-generate.outputs.language == 'python'
        run: |
          pip install --break-system-packages \
            pytest pytest-playwright pytest-json-report
          python -m playwright install --with-deps chromium

      - name: Start application
        run: bash $GITHUB_WORKSPACE/qa-platform/scripts/helpers/start_app.sh "${{ github.workspace }}/project" "${{ inputs.base-url }}"

      - name: Run UAT tests (JS)
        if: needs.detect-and-generate.outputs.language == 'javascript'
        run: npx playwright test generated-tests/uat/ --reporter=json --output=uat-results/ || true

      - name: Run UAT tests (Python)
        if: needs.detect-and-generate.outputs.language == 'python'
        run: pytest generated-tests/uat/ --json-report --json-report-file=uat-results/results.json -v || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: uat-results
          path: uat-results/

  load-test:
    name: "Load Tests"
    runs-on: ubuntu-latest
    needs: [smoke]
    if: inputs.run-load == true

    steps:
      - name: Checkout project repo
        uses: actions/checkout@v4
        with:
          path: project

      - name: Checkout QA platform scripts
        uses: actions/checkout@v4
        with:
          repository: HariniMuruganantham/Automatic-QA-CiCd
          ref: main
          path: qa-platform

      - uses: actions/download-artifact@v4
        with:
          name: generated-tests
          path: generated-tests/

      - name: Install k6
        run: bash $GITHUB_WORKSPACE/qa-platform/scripts/helpers/install_k6.sh

      - name: Start application
        run: bash $GITHUB_WORKSPACE/qa-platform/scripts/helpers/start_app.sh "${{ github.workspace }}/project" "${{ inputs.base-url }}"

      - name: Run load test
        run: |
          k6 run generated-tests/load/load-test.js \
            --vus ${{ inputs.load-vus }} \
            --duration 60s \
            --out json=load-results.json \
            -e BASE_URL=${{ inputs.base-url }} || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-results
          path: load-results.json

  stress-test:
    name: "Stress Tests"
    runs-on: ubuntu-latest
    needs: [smoke]
    if: inputs.run-stress == true

    steps:
      - name: Checkout project repo
        uses: actions/checkout@v4
        with:
          path: project

      - name: Checkout QA platform scripts
        uses: actions/checkout@v4
        with:
          repository: HariniMuruganantham/Automatic-QA-CiCd
          ref: main
          path: qa-platform

      - uses: actions/download-artifact@v4
        with:
          name: generated-tests
          path: generated-tests/

      - name: Install k6
        run: bash $GITHUB_WORKSPACE/qa-platform/scripts/helpers/install_k6.sh

      - name: Start application
        run: bash $GITHUB_WORKSPACE/qa-platform/scripts/helpers/start_app.sh "${{ github.workspace }}/project" "${{ inputs.base-url }}"

      - name: Run stress test
        run: |
          k6 run generated-tests/load/stress-test.js \
            --out json=stress-results.json \
            -e BASE_URL=${{ inputs.base-url }} || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-results
          path: stress-results.json

  report:
    name: "Generate Report"
    runs-on: ubuntu-latest
    needs: [smoke, sanity, api-tests, regression, uat, load-test, stress-test]
    if: always()

    steps:
      - name: Checkout QA platform scripts
        uses: actions/checkout@v4
        with:
          repository: HariniMuruganantham/Automatic-QA-CiCd
          ref: main
          path: qa-platform

      - uses: actions/download-artifact@v4
        with:
          path: all-results/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install report dependencies
        run: pip install openai jinja2 --break-system-packages

      - name: Generate HTML report
        run: |
          python $GITHUB_WORKSPACE/qa-platform/scripts/report/generate_report.py \
            --results-dir all-results/ \
            --project "${{ inputs.project-name }}" \
            --commit "${{ github.sha }}" \
            --branch "${{ github.ref_name }}" \
            --model "${{ inputs.openai-model }}" \
            --output qa-report.html
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Save report artifact
        uses: actions/upload-artifact@v4
        with:
          name: qa-report-${{ github.sha }}
          path: qa-report.html
          retention-days: 30

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let s;
            try {
              s = JSON.parse(fs.readFileSync('all-results/report-summary.json', 'utf8'));
            } catch(e) {
              s = { total:0, passed:0, failed:0, ai_summary:'Report data unavailable.',
                smoke:{passed:0,failed:0,skipped:0}, sanity:{passed:0,failed:0,skipped:0},
                api:{passed:0,failed:0,skipped:0}, regression:{passed:0,failed:0,skipped:0},
                uat:{passed:0,failed:0,skipped:0}, load:{p95:0,errors:0,vus:0} };
            }
            const emoji = s.failed === 0 ? '✅' : '❌';
            const body = [
              `## ${emoji} QA Report — ${{ inputs.project-name }}`,
              `| Suite | ✅ Passed | ❌ Failed | ⊘ Skipped |`,
              `|-------|-----------|-----------|-----------|`,
              `| 💨 Smoke      | ${s.smoke?.passed??0}      | ${s.smoke?.failed??0}      | ${s.smoke?.skipped??0}      |`,
              `| 🔍 Sanity     | ${s.sanity?.passed??0}     | ${s.sanity?.failed??0}     | ${s.sanity?.skipped??0}     |`,
              `| 🔌 API        | ${s.api?.passed??0}        | ${s.api?.failed??0}        | ${s.api?.skipped??0}        |`,
              `| 🔁 Regression | ${s.regression?.passed??0} | ${s.regression?.failed??0} | ${s.regression?.skipped??0} |`,
              `| 👤 UAT        | ${s.uat?.passed??0}        | ${s.uat?.failed??0}        | ${s.uat?.skipped??0}        |`,
              `| 📈 Load       | p95: ${s.load?.p95??0}ms   | errors: ${s.load?.errors??0}% | — |`,
              `**Total: ${s.passed} / ${s.total} passed**`,
              `🤖 **AI Analysis:** ${s.ai_summary}`,
              `📊 [View Full Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });