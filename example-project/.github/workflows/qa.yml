name: QA

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * *"   # nightly stress test

jobs:
  qa:
    uses: YOUR_ORG/qa-platform/.github/workflows/master-qa.yml@main
    with:
      project-name: "my-awesome-app"
      base-url: "http://localhost:3000"
      openai-model: "gpt-4o-mini"       # cheapest — change to gpt-4o for best quality
      run-load: true
      run-stress: ${{ github.event_name == 'schedule' }}  # stress only nightly
      load-vus: 50
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
